<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CocoHealth Forms</title>
    <meta name="robots" content="noindex">
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            background: #f6f8fb;
            color: #16324f;
            font-family: Arial, sans-serif;
        }

        .shell {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .notice {
            padding: 12px 16px;
            background: #16324f;
            color: #ffffff;
            font-size: 14px;
            line-height: 1.4;
        }

        .notice a {
            color: #ffffff;
        }

        iframe {
            border: 0;
            flex: 1;
            width: 100%;
            min-height: calc(100vh - 48px);
            background: #ffffff;
        }
    </style>
</head>
<body>
    <div class="shell">
        <iframe
            src="https://aiforthemass.com/forms/"
            title="CocoHealth Forms"
            loading="eager"
            referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
</body>
</html>
